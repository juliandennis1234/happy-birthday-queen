<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday, My Queen 👑</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at top, #6b1240, #1a0510 80%);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow:hidden;
    position:relative;
  }

  .card {
    position:relative;
    z-index:2;
    text-align:center;
    padding:50px 40px;
    border-radius:20px;
    background: linear-gradient(160deg, rgba(255,255,255,0.08), rgba(255,90,160,0.08));
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,210,140,0.5);
    box-shadow: 0 0 40px rgba(255,20,147,0.45), 0 0 70px rgba(255,215,0,0.18);
    max-width:520px;
    animation: floatIn 1.2s ease-out;
  }

  .crown {
    font-size:60px;
    animation: bounce 2.5s infinite ease-in-out;
  }

  .photo-frame {
    width:160px;
    height:160px;
    margin:20px auto 10px;
    border-radius:50%;
    border:4px solid #ffd86b;
    box-shadow: 0 0 25px rgba(255,20,147,0.6), 0 0 15px rgba(255,215,0,0.4);
    overflow:hidden;
    background: linear-gradient(135deg, rgba(255,61,166,0.2), rgba(255,216,107,0.15));
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .photo-frame img {
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .photo-frame .placeholder {
    color:rgba(255,255,255,0.5);
    font-size:0.85em;
    padding:10px;
  }

  h1 {
    font-size:2.6em;
    color:#ffd86b;
    text-shadow: 0 0 15px rgba(255,20,147,0.85);
    margin:15px 0 10px;
    letter-spacing:1px;
  }

  p {
    color:#ffe9f2;
    font-size:1.15em;
    line-height:1.6;
    margin:10px 0;
  }

  .name {
    color:#ff3da6;
    font-weight:bold;
    text-shadow: 0 0 10px rgba(255,61,166,0.7);
  }

  .hearts {
    margin-top:20px;
    font-size:1.5em;
    filter: drop-shadow(0 0 8px rgba(255,61,166,0.8));
  }

  @keyframes floatIn {
    from { opacity:0; transform: translateY(40px) scale(0.95); }
    to { opacity:1; transform: translateY(0) scale(1); }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }

  /* Floating sparkles / confetti */
  .sparkle {
    position:absolute;
    top:-10px;
    font-size:1.4em;
    opacity:0.8;
    animation: fall linear infinite;
    z-index:1;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity:0; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="crown">👑</div>

  <!-- ===== ADD HER PHOTO HERE ===== -->
  <!-- Replace src="" below with the path/filename of her picture, e.g. src="her-photo.jpg" -->
  <div class="photo-frame">
  <img src="queen.jpg" alt="Her photo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
  </div>
  <!-- ============================= -->

  <h1>Happy Birthday!</h1>
  <p>To my one and only <span class="name">Queen</span> —</p>
  <p>Today the world celebrates the most AMAZING and the FUNNIEST I know!!! THE WORLD REVOLVES AROUND YOU ALWAYS QUEEN!!! (But extra today).</p>
  <p>I love you soon??💜</p>
  <div class="hearts">👑 💖 ✨ 💖 👑</div>
</div>

<script>
  const symbols = ["✨","👑","💖","🎉","💫"];
  const body = document.body;
  for (let i = 0; i < 40; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left = Math.random()*100 + "vw";
    s.style.animationDuration = (4 + Math.random()*5) + "s";
    s.style.animationDelay = (Math.random()*5) + "s";
    s.style.fontSize = (1 + Math.random()*1.5) + "em";
    body.appendChild(s);
  }
</script>

</body>
</html>
